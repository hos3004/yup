services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: yup
      POSTGRES_PASSWORD: yup_dev
      POSTGRES_DB: yup
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yup"]
      interval: 3s
      timeout: 3s
      retries: 10

  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://yup:yup_dev@postgres:5432/yup?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
